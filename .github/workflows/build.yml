name: Build and Deploy Application

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ============================
      # Build & Push API
      # ============================

      - name: Build API Image
        run: |
          docker build -t ghcr.io/hemanthpeddi/helloapi:v1 ./backend/HelloApi

      - name: Push API Image
        run: |
          docker push ghcr.io/hemanthpeddi/helloapi:v1

      # ============================
      # Build & Push Angular UI
      # ============================

      - name: Build UI Image
        run: |
          docker build -t ghcr.io/hemanthpeddi/helloui:v1 ./frontend/hello-ui

      - name: Push UI Image
        run: |
          docker push ghcr.io/hemanthpeddi/helloui:v1

  deploy:
    needs: build

    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Latest Images
        run: |
          docker compose pull

      - name: Deploy Application
        run: |
          docker compose up -d