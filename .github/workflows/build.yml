name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/hemanthpeddi/helloapi:v1 ./backend/HelloApi

      - name: Push Docker Image
        run: |
          docker push ghcr.io/hemanthpeddi/helloapi:v1

  deploy:

    needs: build

    runs-on: self-hosted

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull Latest Image
        run: |
          docker pull ghcr.io/hemanthpeddi/helloapi:v1

      - name: Stop Old Container
        run: |
          docker stop helloapi || true

      - name: Remove Old Container
        run: |
          docker rm helloapi || true

      - name: Start Container
        run: |
          docker run -d \
            --name helloapi \
            -p 5000:8080 \
            ghcr.io/hemanthpeddi/helloapi:v1